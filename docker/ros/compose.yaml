services:
  ros2_dev:
    build:
      context: ../..
      dockerfile: docker/ros/Dockerfile

    image: ros2_cia402_jazzy:dev
    container_name: ros2_cia402_dev

    stdin_open: true
    tty: true

    working_dir: /workspace

    volumes:
      - ../..:/workspace

    environment:
      ROS_DOMAIN_ID: "10"
      PYTHONPATH: "/workspace"
      RCUTILS_COLORIZED_OUTPUT: "1"

      DISPLAY: "host.docker.internal:0.0"
      QT_QPA_PLATFORM: "xcb"
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_INDIRECT: "1"

    command: /bin/bash
